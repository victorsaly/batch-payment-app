name: Release

# Build installers for macOS, Windows and Linux and attach them to a GitHub
# Release whenever you push a version tag (e.g. v1.0.0). Run:
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build & publish installers
        env:
          # electron-builder uploads the artifacts to the GitHub Release for
          # this tag (created as a draft you then publish).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish always
