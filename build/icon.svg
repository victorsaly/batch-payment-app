<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff2b2b"/>
      <stop offset="1" stop-color="#cc0000"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- rounded app tile -->
  <rect x="84" y="84" width="856" height="856" rx="196" fill="url(#bg)"/>

  <!-- batch "rows" motif -->
  <g filter="url(#sh)">
    <rect x="286" y="318" width="452" height="74" rx="37" fill="#ffffff" opacity="0.96"/>
    <rect x="286" y="446" width="452" height="74" rx="37" fill="#ffffff" opacity="0.78"/>
    <rect x="286" y="574" width="452" height="74" rx="37" fill="#ffffff" opacity="0.60"/>
  </g>

  <!-- pound badge -->
  <circle cx="712" cy="700" r="150" fill="#ffffff"/>
  <text x="712" y="772" font-family="Georgia, 'Times New Roman', serif" font-size="230"
        font-weight="700" fill="#cc0000" text-anchor="middle">£</text>
</svg>
