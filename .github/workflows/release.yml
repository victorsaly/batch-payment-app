name: Release

# Build installers for macOS, Windows and Linux, then publish them all to a
# single GitHub Release. Triggered by pushing a version tag (e.g. v1.0.2):
#   git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1) Build on each OS and upload the installers as workflow artifacts.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build installers (no publish)
        run: npx electron-builder --publish never
        env:
          # macOS code signing + notarization. Until these repo secrets are set,
          # CSC_LINK is empty so the build is simply unsigned (pipeline stays green).
          # Add the secrets (see SIGNING.md) and macOS builds sign + notarize automatically.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap

  # 2) Collect every platform's artifacts and publish one draft release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          # Checksum the user-facing installers (not the update metadata files).
          sha256sum *.dmg *.zip *.exe *.AppImage *.deb 2>/dev/null > SHA256SUMS.txt || true
          echo "----- SHA256SUMS.txt -----"; cat SHA256SUMS.txt
      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
