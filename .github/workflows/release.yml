name: Release

# Build installers for macOS, Windows and Linux, then publish them all to a
# single GitHub Release. Triggered by pushing a version tag (e.g. v1.0.2):
#   git tag v1.0.2 && git push origin v1.0.2
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 1) Build on each OS and upload the installers as workflow artifacts.
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # Secrets are exposed under non-CSC names so an empty value can't be mistaken
    # by electron-builder for a certificate path. They're promoted to the real
    # CSC_*/APPLE_* names only when present (see the signing step below).
    env:
      SIGN_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
      SIGN_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
      SIGN_APPLE_ID: ${{ secrets.APPLE_ID }}
      SIGN_APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      SIGN_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

      # On macOS: if the signing secrets exist, promote them to the names
      # electron-builder expects (→ Developer ID signing + notarization). If they
      # don't, disable signing so the build stays green (unsigned/ad-hoc). See
      # SIGNING.md. NOTE: CSC_IDENTITY_AUTO_DISCOVERY=false must NOT be set when
      # signing — it makes electron-builder skip signing even with CSC_LINK present.
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        run: |
          if [ -n "$SIGN_CSC_LINK" ]; then
            echo "Signing with Developer ID + notarizing."
            {
              echo "CSC_LINK<<__P12__"
              echo "$SIGN_CSC_LINK"
              echo "__P12__"
              echo "CSC_KEY_PASSWORD=$SIGN_CSC_KEY_PASSWORD"
              echo "APPLE_ID=$SIGN_APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$SIGN_APPLE_APP_PASSWORD"
              echo "APPLE_TEAM_ID=$SIGN_APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
          else
            echo "No signing secrets — building unsigned."
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      # Build the React renderer into src/renderer-dist BEFORE packaging — it's
      # gitignored, so without this step the app ships with no UI (white screen).
      - name: Build renderer (React + Vite)
        run: npm run build:renderer
      - name: Verify renderer bundle exists
        shell: bash
        run: test -f src/renderer-dist/index.html || (echo "renderer-dist missing — build failed" && exit 1)

      - name: Build installers (no publish)
        run: npx electron-builder --publish never
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap

  # 2) Collect every platform's artifacts and publish one draft release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate SHA-256 checksums
        run: |
          cd artifacts
          # Checksum the user-facing installers (not the update metadata files).
          sha256sum *.dmg *.zip *.exe *.AppImage *.deb 2>/dev/null > SHA256SUMS.txt || true
          echo "----- SHA256SUMS.txt -----"; cat SHA256SUMS.txt
      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
